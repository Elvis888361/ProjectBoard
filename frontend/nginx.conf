server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths are client-side routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API, so the session cookie works without CORS. Same shape as the Vite
    # proxy in dev, on purpose.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE. Regex, not a prefix: `location /api/v1/projects/` would swallow every other
    # project endpoint AND make nginx 301 the bare /api/v1/projects path.
    #
    # buffering off  -- on by default; nginx holds the stream in a buffer and it stops
    #                   being real-time. gzip buffers too.
    # read_timeout   -- 60s by default, and an idle stream sends nothing.
    location ~ ^/api/v1/projects/[^/]+/events$ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
    }
}
