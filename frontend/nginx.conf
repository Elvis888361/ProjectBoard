server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths are client-side routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API. The browser sees one origin, so the session cookie is sent
    # without CORS and without SameSite=None. Dev (Vite proxy) and prod (here) are the
    # same shape on purpose -- auth that only works in one of them is auth I can't test.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # The SSE stream needs its own block, and it must match ONLY the stream.
    #
    # A regex location, not a prefix one. `location /api/v1/projects/` would also have
    # swallowed every other project endpoint (the board fetch, task creation), turning
    # off buffering for responses that actually benefit from it -- and nginx 301s the
    # bare `/api/v1/projects` path when a trailing-slash prefix location like that
    # exists, which breaks the board list outright. Regex locations are matched before
    # prefix ones, so this hits the stream and nothing else.
    #
    # Each of these lines is a specific way SSE dies behind a proxy:
    #
    #   proxy_buffering off   -- nginx buffers proxied responses by default. It will
    #                            happily hold your event stream in a buffer and flush it
    #                            when the buffer fills. The stream still "works"; it is
    #                            just no longer real-time. This is the classic one.
    #   gzip off              -- the gzip filter buffers too, for the same reason.
    #   proxy_read_timeout    -- defaults to 60s. An idle SSE connection sends nothing,
    #                            so nginx would kill it every minute. The app also sends
    #                            a `: ping` comment every 20s (belt and braces), but the
    #                            timeout still needs raising for a genuinely quiet board.
    #   Connection ""         -- don't forward a `close` header upstream.
    location ~ ^/api/v1/projects/[^/]+/events$ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
    }
}
